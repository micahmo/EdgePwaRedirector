name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish TeamsLinkRedirector.csproj -c Release -r win-x64 --self-contained false -o publish

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss'
        shell: pwsh

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: installer_output/TeamsLinkRedirector-Setup.exe
          generate_release_notes: true
